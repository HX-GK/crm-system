<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: white; border-radius: 12px; padding: 40px; width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .login-card h1 { color: #1a73e8; font-size: 22px; margin-bottom: 5px; }
    .login-card p { color: #999; font-size: 13px; margin-bottom: 25px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; color: #333; margin-bottom: 6px; font-weight: 500; }
    .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    .form-group input:focus { border-color: #1a73e8; }
    .btn { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 500; }
    .btn:hover { background: #1557b0; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    #msg { margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 13px; display: none; }
    #msg.error { display: block; background: #fde8e8; color: #c5221f; }
    #msg.success { display: block; background: #e6f4ea; color: #137333; }
    #msg.info { display: block; background: #e8f0fe; color: #1a73e8; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>CRM管理系统</h1>
    <p>客户关系管理与订单追踪系统</p>
    <div class="form-group">
      <label>邮箱地址</label>
      <input type="email" id="email" placeholder="请输入邮箱" value="">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" value="">
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">登录</button>
    <div id="msg"></div>
  </div>
<script>
const SUPABASE_URL = 'https://dcxzcpjcivfocpknsku.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRjeHpjcHhqY2l2Zm9jcGtuc2t1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMDkzNzIsImV4cCI6MjA5Mzc4NTM3Mn0.ByjQzzwmP7PThnSM3gNjwDllqksO_NjfEOhNhpqdlmE';

function showMsg(text, type) {
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = type;
}

async function doLogin() {
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var btn = document.getElementById('loginBtn');
  
  if (!email || !password) {
    showMsg('请输入邮箱和密码', 'error');
    return;
  }
  
  btn.disabled = true;
  btn.textContent = '登录中...';
  showMsg('正在连接服务器...', 'info');
  
  try {
    var resp = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ email: email, password: password })
    });
    
    var data = await resp.json();
    
    if (data.error) {
      showMsg('登录失败: ' + (data.error_description || data.error.message || JSON.stringify(data.error)), 'error');
      btn.disabled = false;
      btn.textContent = '登录';
      return;
    }
    
    if (data.access_token) {
      localStorage.setItem('sb_access_token', data.access_token);
      localStorage.setItem('sb_refresh_token', data.refresh_token);
      showMsg('登录成功！', 'success');
      setTimeout(function() { window.location.reload(); }, 1500);
    } else {
      showMsg('未知响应: ' + JSON.stringify(data).substring(0, 200), 'error');
      btn.disabled = false;
      btn.textContent = '登录';
    }
  } catch (err) {
    showMsg('网络错误: ' + err.message + ' (Supabase可能无法访问，请检查网络)', 'error');
    btn.disabled = false;
    btn.textContent = '登录';
  }
}
</script>
</body>
</html>
